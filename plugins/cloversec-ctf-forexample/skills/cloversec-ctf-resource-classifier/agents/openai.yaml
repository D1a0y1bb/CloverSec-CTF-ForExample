interface:
  display_name: "CloverSec CTF Resource Classifier"
  short_description: "识别材料目录并给出 Dockerizer、附件、手册或人工确认入口"
  default_prompt: "使用 $cloversec-ctf-resource-classifier 处理本地题目材料目录。优先调用 cloversec_ctf_resource_route，输出 resource_classification.json、resource_route.json，容器相关目录还要输出 container_inference.json 和 dockerizer_handoff。没有源码/附件时写缺失项；附件题走 cloversec-ctf-attachment-packager；源码、Dockerfile、compose、source archive、镜像构建信息、端口服务都必须直接交给 cloversec-ctf-build-dockerizer。上游 Dockerfile/compose 只是迁移输入，不能当 CloverSec 平台最终交付。Dockerizer 自动渲染未完成时写 auto_action=auto-render、failure_category=platform_conversion_required、next_skill=cloversec-ctf-build-dockerizer、can_archive=false。"
