interface:
  display_name: "CloverSec CTF Hub Submission"
  short_description: "生成 Hub 表单字段、上传清单和提交材料包"
  default_prompt: "使用 $cloversec-ctf-hub-submission 根据手册、附件、截图和 hub_fields.json 生成 Hub 提交材料包、Hub 草稿、上传清单、截图清单和差异报告。只做材料和浏览器辅助计划；不读取 Cookie/token/session，不自动提交。输出 skill/MCP ID 时只能写精确 ID：cloversec-ctf-hub-submission、cloversec_ctf_hub_draft、cloversec_ctf_hub_chrome_plan、cloversec_ctf_hub_review_state、cloversec_ctf_hub_validate_manifest。"
