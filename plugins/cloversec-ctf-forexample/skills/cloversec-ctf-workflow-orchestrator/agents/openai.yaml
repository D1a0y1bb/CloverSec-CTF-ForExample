interface:
  display_name: "CloverSec CTF Workflow Orchestrator"
  short_description: "从一句目标开始采集、下载预览、识别资源并分流到下一步"
  default_prompt: "使用 $cloversec-ctf-workflow-orchestrator 处理 CloverSec CTF 长流程。用户给年份/赛事/方向/数量或只说完整收集一道题时，优先调用 cloversec_ctf_workflow_run 跑安全阶段直到 final_report；如果工具列表没有这个 MCP，先搜索加载 CloverSec workflow MCP，再退回脚本。不要手写 ctf_case.json 后自己拼 Web-题目名 目录当最终交付。用户给本地目录时，用 cloversec_ctf_resource_route 判断走 Dockerizer、附件检查、手册还是人工确认。看到源码、Dockerfile、compose、镜像 tar、端口服务、Web/Pwn 在线服务题或镜像构建需求时，必须直接交给 cloversec-ctf-build-dockerizer；原始 Dockerfile/compose 只算迁移输入。Dockerizer 自动渲染未完成时写 auto_action=auto-render、failure_category=platform_conversion_required、next_skill=cloversec-ctf-build-dockerizer、can_archive=false。机器 JSON 布尔字段只能写 true/false；没有 CTF-... 正式编号时 retag 用的 HUB 字段必须留空。最终交付只报中文交付目录：有同级 outputs 时直接写 outputs 根目录，否则写 最终交付包；archive、_cache、_quality、reports、manifests、元数据、过程 JSON、草稿、英文中间报告不得当作给人接手的目录。"
