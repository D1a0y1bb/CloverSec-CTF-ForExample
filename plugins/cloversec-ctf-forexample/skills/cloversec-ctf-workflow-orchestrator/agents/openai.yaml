interface:
  display_name: "CloverSec CTF Workflow Orchestrator"
  short_description: "创建批量采集任务、状态机、搜索策略、证据、资源识别、去重和下载沙箱"
  default_prompt: "使用 $cloversec-ctf-workflow-orchestrator 创建 CloverSec CTF 批量工作流，维护 workflow_state.json，并生成搜索策略、来源证据、资源识别、去重候选、下载沙箱预览、确认请求和阶段通知。看到 Dockerfile/compose 只能作为迁移输入。未确认 Dockerizer 方案时必须写 confirmation_action=dockerizer、failure_category=platform_conversion_required、可归档=false。输出 ID 时只能写精确值。"
