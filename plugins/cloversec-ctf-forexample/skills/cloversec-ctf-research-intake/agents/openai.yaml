interface:
  display_name: "CloverSec CTF Research Intake"
  short_description: "按年份、赛事和方向执行题目采集并整理材料线索"
  default_prompt: "使用 $cloversec-ctf-research-intake 收集 CTF 题目、WP、源码和附件。用户给年份/赛事/方向/数量时，用 cloversec_ctf_workflow_init 创建工作目录，再用 cloversec_ctf_collect_execute 执行搜索任务，写 search_results.json、ctf_cases.jsonl 和证据；找到附件 URL、GitHub Release、raw/tree 或仓库后，用 cloversec_ctf_collect_materials 做下载预览和失败原因记录。单次补充查询可用 cloversec_ctf_search_plus。输出 skill/MCP ID 时只能写精确 ID。"
