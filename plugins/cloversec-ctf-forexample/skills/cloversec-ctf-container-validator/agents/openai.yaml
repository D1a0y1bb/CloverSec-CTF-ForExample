interface:
  display_name: "CloverSec CTF Container Validator"
  short_description: "识别容器题、选择 Docker 验证等级并生成 proof 证据包"
  default_prompt: "使用 $cloversec-ctf-container-validator 生成 container_inference.json；优先调用 cloversec_ctf_container_infer，再用 cloversec_ctf_docker_validation_plan 生成 Docker 验证等级计划，最后用 cloversec_ctf_proof_pack 整理 proof 证据包。Dockerfile/compose 的 build/run 结果只是证据，容器题最终必须进入 cloversec-ctf-build-dockerizer，生成或校验 /start.sh、/changeflag.sh、/flag、端口、amd64、镜像 tar 和 xlsx 字段。"
