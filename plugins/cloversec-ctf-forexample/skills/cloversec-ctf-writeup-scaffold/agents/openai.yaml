interface:
  display_name: "CloverSec CTF Writeup Scaffold"
  short_description: "生成正式中文题目手册、录题字段与归档字段"
  brand_color: "#2563EB"
  default_prompt: "使用 $cloversec-ctf-writeup-scaffold 处理当前题目目录；可直接给题目目录，也可用 --project-dir path/to/challenge。先输出字段提案，再生成 分类-题目名.md、题目解题手册.md、hub_fields.json 和 xlsx_fields.json。"

policy:
  allow_implicit_invocation: true
