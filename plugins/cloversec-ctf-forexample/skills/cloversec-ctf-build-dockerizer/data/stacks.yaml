version: 1
stacks:
  - id: node
    display_name: Node.js
    detect:
      any_of_files:
        - package.json
        - pnpm-lock.yaml
        - yarn.lock
      any_of_dirs:
        - node_modules
    defaults:
      base_image: "node:20-alpine"
      workdir: "/app"
      expose_ports:
        - "3000"
      start_cmd: "node server.js"
      healthcheck_cmd: "bash -lc 'echo > /dev/tcp/127.0.0.1/3000'"
    notes: >
      适用于 Node 原生 http、Express、Koa、Fastify 单服务场景。默认 alpine 更轻量，
      若依赖原生模块并出现兼容问题可切换 node:20-slim。

  - id: php
    display_name: PHP (Apache)
    detect:
      any_of_files:
        - composer.json
        - index.php
        - artisan
      any_of_dirs:
        - vendor
    defaults:
      base_image: "php:8.2-apache"
      workdir: "/var/www/html"
      expose_ports:
        - "80"
      start_cmd: "apache2-foreground"
      healthcheck_cmd: "bash -lc 'echo > /dev/tcp/127.0.0.1/80'"
    notes: >
      默认 Apache 分支，适合 PHP 单服务题目。若需要 php-fpm，请在 challenge.yaml 覆盖镜像与启动命令。

  - id: python
    display_name: Python
    detect:
      any_of_files:
        - requirements.txt
        - pyproject.toml
        - Pipfile
        - app.py
      any_of_dirs:
        - .venv
        - venv
    defaults:
      base_image: "python:3.11-slim"
      workdir: "/app"
      expose_ports:
        - "5000"
      start_cmd: "python app.py"
      healthcheck_cmd: "bash -lc 'echo > /dev/tcp/127.0.0.1/5000'"
    notes: >
      适用于 Flask/FastAPI/Django 或自定义 HTTP 服务。slim 镜像兼顾体积与依赖兼容性。

  - id: java
    display_name: Java (JAR)
    detect:
      any_of_files:
        - pom.xml
        - build.gradle
        - build.gradle.kts
        - app.jar
      any_of_dirs:
        - src
        - target
    defaults:
      base_image: "eclipse-temurin:17-jre-jammy"
      workdir: "/app"
      expose_ports:
        - "8080"
      start_cmd: "java -jar app.jar"
      healthcheck_cmd: "bash -lc 'echo > /dev/tcp/127.0.0.1/8080'"
    notes: >
      面向已产出 JAR 的运行场景。若需要容器内编译，建议使用多阶段构建并在 challenge.yaml 增加构建步骤。

  - id: tomcat
    display_name: Tomcat (WAR)
    detect:
      any_of_files:
        - ROOT.war
        - web.xml
        - context.xml
      any_of_dirs:
        - webapps
        - src/main/webapp
    defaults:
      base_image: "tomcat:9.0-jre17-temurin-jammy"
      workdir: "/usr/local/tomcat"
      expose_ports:
        - "8080"
      start_cmd: "catalina.sh run"
      healthcheck_cmd: "bash -lc 'echo > /dev/tcp/127.0.0.1/8080'"
    notes: >
      使用官方 Tomcat 镜像，部署 WAR 时建议目标路径为 /usr/local/tomcat/webapps/ROOT.war。

  - id: lamp
    display_name: LAMP
    detect:
      any_of_files:
        - index.php
        - mysql.sql
        - init.sql
      any_of_dirs:
        - htdocs
        - www
    defaults:
      base_image: "debian:bookworm-slim"
      workdir: "/var/www/html"
      expose_ports:
        - "80"
      start_cmd: "apache2ctl -D FOREGROUND"
      healthcheck_cmd: "bash -lc 'echo > /dev/tcp/127.0.0.1/80'"
    notes: >
      多服务最小策略为 MariaDB 后台 + Apache 前台。默认不暴露 3306，需要时可在 expose_ports 中追加。

  - id: pwn
    display_name: Pwn (xinetd/tcpserver/socat)
    detect:
      any_of_files:
        - ctf.xinetd
        - xinetd.conf
        - libc.so.6
      any_of_dirs:
        - bin
        - lib
    defaults:
      base_image: "debian:bookworm-slim"
      workdir: "/home/ctf"
      expose_ports:
        - "10000"
      start_cmd: "/usr/sbin/xinetd -dontfork"
      healthcheck_cmd: "bash -lc 'echo > /dev/tcp/127.0.0.1/10000'"
    notes: >
      适用于 Jeopardy 模式 Pwn 题目，默认以 xinetd 前台方式启动，
      并可按基础镜像能力回退到 tcpserver/socat 前台路径。
      当前不覆盖 AWD/AWDP 赛制编排与批量攻防场景。

  - id: ai
    display_name: AI (CPU Inference)
    detect:
      any_of_files:
        - requirements.txt
        - app.py
        - wsgi.py
      any_of_dirs:
        - model
        - models
    defaults:
      base_image: "python:3.11-slim"
      workdir: "/app"
      expose_ports:
        - "5000"
      start_cmd: "gunicorn -w 1 --threads 1 -b 0.0.0.0:5000 app:app"
      healthcheck_cmd: "bash -lc 'echo > /dev/tcp/127.0.0.1/5000'"
    notes: >
      适用于 AI Web 题目（CPU 推理默认路径），建议收紧 OpenBLAS/OMP/MKL 线程数。
      当前不覆盖 AWD/AWDP 赛制编排。

  - id: rdg
    display_name: RDG (Docker)
    detect:
      any_of_files:
        - docker-compose.yml
        - docker-compose.yaml
        - ttyd
        - start.sh
      any_of_dirs:
        - check
        - Writeup
        - Write Up
    defaults:
      base_image: "debian:bookworm-slim"
      workdir: "/app"
      expose_ports:
        - "80"
      start_cmd: "bash -lc 'if command -v apache2-foreground >/dev/null 2>&1; then exec apache2-foreground; elif command -v python3 >/dev/null 2>&1; then exec python3 app.py; elif command -v python >/dev/null 2>&1; then exec python app.py; elif command -v nginx >/dev/null 2>&1; then exec nginx -g \"daemon off;\"; else exec /bin/bash; fi'"
      healthcheck_cmd: "bash -lc 'echo > /dev/tcp/127.0.0.1/80'"
    notes: >
      适用于 RDG（Docker）防御修复题目模式，默认启用 ttyd + sshd 双通道登录。
      默认采用 check-service 判定链路，ctf 账号默认口令为 123456，可按题目配置覆盖。

  - id: secops
    display_name: SecOps (Security Operations)
    detect:
      any_of_files:
        - sshd_config
        - redis.conf
        - my.cnf
        - nginx.conf
        - httpd.conf
        - server.xml
        - vsftpd.conf
        - config.xml
      any_of_dirs:
        - check
        - conf
        - config
        - configs
        - Writeup
        - Write Up
    defaults:
      base_image: "debian:bookworm-slim"
      workdir: "/app"
      expose_ports:
        - "80"
      start_cmd: "bash -lc 'if command -v nginx >/dev/null 2>&1; then exec nginx -g \"daemon off;\"; elif command -v apache2-foreground >/dev/null 2>&1; then exec apache2-foreground; elif command -v httpd >/dev/null 2>&1; then exec httpd -D FOREGROUND; elif command -v redis-server >/dev/null 2>&1; then exec redis-server --protected-mode no --bind 0.0.0.0; elif command -v mysqld >/dev/null 2>&1; then exec mysqld --user=mysql; elif command -v /usr/sbin/sshd >/dev/null 2>&1; then exec /usr/sbin/sshd -D -e; else exec /bin/bash; fi'"
      healthcheck_cmd: "bash -lc 'echo > /dev/tcp/127.0.0.1/80'"
    notes: >
      安全运维模式，适用于服务配置加固与检查驱动型题目。默认走 check-service 语义，
      与 secops profile 搭配使用，并保持与 RDG 语义隔离。

  - id: linux-qemu
    display_name: Linux Kernel QEMU VM
    detect:
      any_of_files:
        - vm/vmlinuz
        - vm/bzImage
        - vm/Image
        - vm/initrd.img
        - vm/initramfs.cpio.gz
        - vm/rootfs.ext4
        - run.sh
        - qemu.sh
      any_of_dirs:
        - vm
    defaults:
      base_image: "debian:bookworm-slim"
      workdir: "/opt/linux-qemu"
      expose_ports:
        - "22"
      start_cmd: "qemu-system-x86_64"
      healthcheck_cmd: "bash -lc 'timeout 8 bash -c \"</dev/tcp/127.0.0.1/22\"'"
    notes: >
      面向 Linux kernel CVE/LPE 题目：外层 Docker 镜像承载 QEMU，
      内层 VM 承载指定 vulnerable kernel/rootfs。默认走 TCG 以适配普通平台；
      KVM 仅作为显式声明的可选加速路径。

  - id: baseunit
    display_name: Base Service Unit
    detect:
      any_of_files: []
      any_of_dirs: []
    defaults:
      base_image: "debian:bookworm-slim"
      workdir: "/app"
      expose_ports:
        - "80"
      start_cmd: "bash -lc 'echo \"[ERROR] baseunit requires explicit start.cmd\" >&2; exit 2'"
      healthcheck_cmd: "bash -lc 'echo > /dev/tcp/127.0.0.1/80'"
    notes: >
      纯服务包/纯基座镜像最小单元模式。建议通过 render_component.py 显式指定 component 与 variant，
      不依赖自动侦测。
