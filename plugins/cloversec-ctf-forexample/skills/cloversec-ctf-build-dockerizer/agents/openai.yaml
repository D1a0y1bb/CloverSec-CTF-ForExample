interface:
  display_name: "CloverSec CTF Build Dockerizer"
  short_description: "将 CTF 题目整理为可验证的 Docker 交付件，支持内核题与多服务场景"
  brand_color: "#2563EB"
  default_prompt: "使用 $cloversec-ctf-build-dockerizer 处理当前题目目录；可直接给 path/to/challenge.yaml，也可用 --project-dir path/to/challenge。读取题目结构、已有 Dockerfile/compose、源码、flag 逻辑和启动线索后，直接生成 CloverSec 平台 Docker 交付件并执行可做的静态校验；只有真实启动未知容器、高权限运行或无法判断的业务取舍需要停下让用户决定。"

policy:
  allow_implicit_invocation: true
