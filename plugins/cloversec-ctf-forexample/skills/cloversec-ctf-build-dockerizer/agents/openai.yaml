interface:
  display_name: "CloverSec CTF Build Dockerizer"
  short_description: "将 CTF 题目整理为可验证的 Docker 交付件，支持内核题与多服务场景"
  brand_color: "#2563EB"
  default_prompt: "使用 $cloversec-ctf-build-dockerizer 处理当前题目目录；可直接给 path/to/challenge.yaml，也可用 --project-dir path/to/challenge。先分析题目结构、风险点和缺失信息，给出构建方案或低风险方案摘要；即使已有明确 challenge.yaml，也必须等用户确认 OK 后，再生成 Docker 交付件并执行验证。"

policy:
  allow_implicit_invocation: true
