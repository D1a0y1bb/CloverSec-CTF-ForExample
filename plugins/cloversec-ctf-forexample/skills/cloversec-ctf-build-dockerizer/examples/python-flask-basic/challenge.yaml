challenge:
  name: "python-flask-basic"
  stack: "python"
  base_image: "python:3.11-slim"
  workdir: "/app"
  app_src: "."
  app_dst: "/app"
  expose_ports:
    - "5000"
  start:
    mode: "cmd"
    cmd: "python app.py"
    service_name: ""
  runtime_deps: []
  build_deps: []
  flag:
    path: "/flag"
    permission: "444"
  verification:
    solve_probe:
      type: "http"
      path: "/"
      expect_status: 200
      expect_text: "hello from python-flask-basic"
      timeout_seconds: 5
  platform:
    entrypoint: "/start.sh"
    require_bash: true
  extra:
    env:
      PYTHONUNBUFFERED: "1"
    copy: []
    user: ""
