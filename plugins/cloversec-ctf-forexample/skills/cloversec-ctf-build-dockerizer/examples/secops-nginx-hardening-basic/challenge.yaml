challenge:
  name: secops-nginx-hardening-basic
  stack: secops
  profile: secops
  base_image: nginx:1.27-bookworm
  workdir: /usr/share/nginx/html
  app_src: .
  app_dst: /usr/share/nginx/html
  expose_ports:
    - "80"
    - "22"
    - "8022"
  start:
    mode: cmd
    cmd: nginx -g 'daemon off;'
  runtime_deps: []
  platform:
    entrypoint: /start.sh
    require_bash: true
  defense:
    enable_ttyd: true
    ttyd_port: "8022"
    ttyd_login_cmd: /bin/bash
    enable_sshd: true
    sshd_port: "22"
    sshd_password_auth: true
    ttyd_binary_relpath: ttyd
    ttyd_install_fallback: true
    ctf_user: ctf
    ctf_password: "123456"
    ctf_in_root_group: false
    scoring_mode: check_service
    include_flag_artifact: true
    check_enabled: true
    check_script_path: check/check.sh
  extra:
    env: {}
    copy: []
    user: ""
