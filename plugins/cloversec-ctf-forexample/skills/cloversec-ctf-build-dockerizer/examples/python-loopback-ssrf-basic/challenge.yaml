challenge:
  name: python-loopback-ssrf-basic
  stack: python
  base_image: python:3.11-slim
  workdir: /app
  app_src: .
  app_dst: /app
  expose_ports:
    - "5000"
  start:
    mode: cmd
    cmd: "gunicorn -w 1 --threads 1 -b 127.0.0.1:5000 app:app"
  runtime_deps: []
  build_deps: []
  flag:
    path: /flag
    permission: "444"
  platform:
    entrypoint: /start.sh
    require_bash: true
    allow_loopback_bind: true
  healthcheck:
    enabled: false
    cmd: ""
    interval: "30s"
    timeout: "5s"
    retries: 3
    start_period: "10s"
  extra:
    env:
      PYTHONUNBUFFERED: "1"
    copy: []
    user: ""
