challenge:
  name: ai-basic
  stack: ai
  base_image: python:3.11-slim
  workdir: /app
  app_src: .
  app_dst: /app
  expose_ports:
    - "5000"
  start:
    mode: cmd
    cmd: gunicorn -w 1 --threads 1 -b 0.0.0.0:5000 app:app
  runtime_deps: []
  build_deps: []
  flag:
    path: /flag
    permission: "444"
  platform:
    entrypoint: /start.sh
    require_bash: true
  extra:
    env:
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
    copy: []
    user: ""
