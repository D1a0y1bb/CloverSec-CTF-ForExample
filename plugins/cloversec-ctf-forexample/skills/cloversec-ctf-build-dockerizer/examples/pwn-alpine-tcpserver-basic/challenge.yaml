challenge:
  name: pwn-alpine-tcpserver-basic
  stack: pwn
  base_image: alpine:3.20
  workdir: /home/ctf
  app_src: .
  app_dst: /home/ctf
  expose_ports:
    - "10000"
  start:
    mode: cmd
    cmd: /usr/sbin/xinetd -dontfork
  runtime_deps: []
  build_deps: []
  flag:
    path: /flag
    permission: "444"
  platform:
    entrypoint: /start.sh
    require_bash: true
    allow_loopback_bind: false
  healthcheck:
    enabled: true
    cmd: "bash -lc 'echo > /dev/tcp/127.0.0.1/10000'"
    interval: "30s"
    timeout: "5s"
    retries: 3
    start_period: "10s"
  extra:
    env: {}
    copy: []
    user: ""
