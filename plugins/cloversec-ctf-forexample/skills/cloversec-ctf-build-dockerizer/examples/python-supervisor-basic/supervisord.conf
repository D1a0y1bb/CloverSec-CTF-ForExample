[supervisord]
nodaemon=true
loglevel=info

[program:web]
command=python /app/app.py
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr

[program:admin]
command=python /app/admin.py
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
