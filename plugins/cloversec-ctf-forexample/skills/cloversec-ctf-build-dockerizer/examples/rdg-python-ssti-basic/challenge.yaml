challenge:
  name: "rdg-python-ssti-basic"
  stack: "rdg"
  base_image: "python:3.11-slim"
  workdir: "/app"
  app_src: "."
  app_dst: "/app"
  expose_ports:
    - "80"
    - "22"
    - "8022"
  start:
    mode: "cmd"
    cmd: "python app.py"
  runtime_deps: []
  build_deps: []
  flag:
    path: "/flag"
    permission: "444"
  platform:
    entrypoint: "/start.sh"
    require_bash: true
  rdg:
    enable_ttyd: true
    ttyd_port: "8022"
    ttyd_login_cmd: "/bin/bash"
    enable_sshd: true
    sshd_port: "22"
    sshd_password_auth: true
    ttyd_binary_relpath: "ttyd"
    ttyd_install_fallback: true
    ctf_user: "ctf"
    ctf_password: "123456"
    ctf_in_root_group: false
    scoring_mode: "check_service"
    include_flag_artifact: false
    check_enabled: true
    check_script_path: "check/check.sh"
  extra:
    env:
      PYTHONUNBUFFERED: "1"
    copy: []
    user: ""
