name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate release metadata
        run: python3 scripts/validate_release.py

      - name: Compile plugin scripts
        run: python3 -m py_compile $(find plugins/cloversec-ctf-forexample/scripts -name '*.py' -print)

      - name: Run tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Package release artifacts
        run: python3 scripts/package_plugin_release.py

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="$(python3 -c 'import json; manifest = json.load(open("plugins/cloversec-ctf-forexample/.codex-plugin/plugin.json", encoding="utf-8")); print(manifest["interface"]["displayName"] + " " + manifest["version"])')"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "$TITLE" \
              --notes-file dist/release-notes.md \
              --verify-tag
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --title "$TITLE" \
              --notes-file dist/release-notes.md \
              --verify-tag
          fi
